#inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-sorted_methods_by_call
  - rubocop-rspec
  - rubocop-rake

AllCops:
  NewCops: enable
  TargetRubyVersion: 2.7

Gemspec/DevelopmentDependencies:
  Exclude:
    - 'docscribe.gemspec'

Style/DoubleNegation:
  Enabled: false

Lint/BooleanSymbol:
  Enabled: false

Style/RedundantFetchBlock:
  Enabled: false
