name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [ 2.7, 3.0, 3.1, 3.2, 3.3, 3.4, 4.0 ]
    env:
      BUNDLE_GEMFILE: ${{ matrix.ruby == '2.7' && 'Gemfile_2_7' || 'Gemfile' }}
      BUNDLE_WITHOUT: ${{ contains(fromJson('["3.0", "3.1"]'), matrix.ruby) && 'rbs' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Docscribe (check docs are up-to-date)
        env:
          BUNDLE_GEMFILE: 'Gemfile'
        run: |
          cd test_project
          bundle install
          FILES="$(cd .. && git ls-files 'lib/**/*.rb' | sed 's|^|../|')"
          bundle exec docscribe $FILES -C ../docscribe.yml

      - name: Docscribe (aggressive mode smoke test)
        env:
          BUNDLE_GEMFILE: ${{ matrix.ruby == '2.7' && 'Gemfile_2_7' || 'Gemfile' }}
        run: |
          bundle exec docscribe lib -AkB --verbose

      - name: Steep (type check)
        if: ${{ !contains(fromJson('["2.7", "3.0", "3.1"]'), matrix.ruby) }}
        run: bundle exec steep check

      - name: RuboCop (self‑check)
        run: bundle exec rubocop

      - name: RSpec
        run: bundle exec rspec
