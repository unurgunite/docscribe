# Download sources
sources:
  - type: git
    name: ruby/gem_rbs_collection
    remote: https://github.com/ruby/gem_rbs_collection.git
    revision: main
    repo_dir: gems

# You can specify local directories as sources also.
# - type: local
#   path: path/to/your/local/repository

# A directory to install the downloaded RBSs
path: .gem_rbs_collection

gems:
  - name: rbs
  - name: prism
  - name: parser
  - name: optparse
  - name: fileutils
  - name: pathname
  - name: json
  - name: logger
  - name: monitor
  - name: tsort
  - name: forwardable
  - name: strscan
  - name: securerandom
  - name: socket
  - name: digest
